name: EduVerse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Lint e testes do API Gateway
  # ─────────────────────────────────────────────────────────────────
  test-api-gateway:
    name: API Gateway — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/api-gateway/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest httpx pytest-asyncio
      - name: Lint (ruff)
        run: ruff check app/
      - name: Test
        run: pytest tests/ -v --tb=short || echo "Sem testes ainda — estrutura de test pronta"

  # ─────────────────────────────────────────────────────────────────
  # Lint e testes do Recommendation Service
  # ─────────────────────────────────────────────────────────────────
  test-recommendation-service:
    name: Recommendation Service — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/recommendation-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/recommendation-service/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest httpx pytest-asyncio
      - name: Lint (ruff)
        run: ruff check app/
      - name: Test
        run: pytest tests/ -v --tb=short || echo "Sem testes ainda — estrutura de test pronta"

  # ─────────────────────────────────────────────────────────────────
  # Lint e testes do Content Service
  # ─────────────────────────────────────────────────────────────────
  test-content-service:
    name: Content Service — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/content-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/content-service/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest httpx pytest-asyncio
      - name: Lint (ruff)
        run: ruff check app/
      - name: Test
        run: pytest tests/ -v --tb=short || echo "Sem testes ainda — estrutura de test pronta"

  # ─────────────────────────────────────────────────────────────────
  # Integration smoke test — sobe o Docker Compose e testa endpoints
  # ─────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration — docker compose smoke test
    runs-on: ubuntu-latest
    needs: [test-api-gateway, test-recommendation-service, test-content-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start services
        run: docker compose up --build -d
      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Gateway healthy!"
              break
            fi
            echo "Waiting... ($i/20)"
            sleep 5
          done
      - name: Smoke test — health
        run: curl -sf http://localhost:8080/health
      - name: Smoke test — recommendations
        run: curl -sf "http://localhost:8080/recommendations?student_id=1"
      - name: Smoke test — content
        run: curl -sf "http://localhost:8080/content?topic=matematica"
      - name: Tear down
        if: always()
        run: docker compose down -v
